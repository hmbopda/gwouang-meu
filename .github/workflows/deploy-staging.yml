name: Deploy — Staging

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    name: Test Backend
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgis/postgis:16-3.4-alpine
        ports:
          - 5432:5432
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: gwangmeu_test
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: temurin

      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Run tests
        working-directory: backend
        run: mvn verify -B -q
        env:
          SUPABASE_DB_URL: jdbc:postgresql://localhost:5432/gwangmeu_test
          SUPABASE_URL: https://dummy.supabase.co
          SUPABASE_ANON_KEY: dummy-anon-key
          SUPABASE_SERVICE_KEY: dummy-service-key
          REDIS_URL: redis://localhost:6379
          REDIS_TOKEN: dummy-redis-token
          NEO4J_URI: bolt://localhost:7687
          NEO4J_USERNAME: neo4j
          NEO4J_PASSWORD: dummy-neo4j-password
          JWT_SECRET: test_secret_ci_32_chars_minimum_here
          ANTHROPIC_API_KEY: sk-ant-test-dummy
          LIVEKIT_API_KEY: dummy-livekit-key
          LIVEKIT_API_SECRET: dummy-livekit-secret
          LIVEKIT_WS_URL: wss://dummy.livekit.cloud
          MAPBOX_ACCESS_TOKEN: pk.dummy-mapbox-token
          MEILISEARCH_HOST: http://localhost:7700
          MEILISEARCH_API_KEY: dummy-meilisearch-key
          R2_ACCESS_KEY_ID: dummy-r2-access-key
          R2_SECRET_ACCESS_KEY: dummy-r2-secret-key
          R2_BUCKET_NAME: gwangmeu-media
          R2_ACCOUNT_ID: dummy-cloudflare-account-id
          RESEND_API_KEY: re_dummy_key
          SENTRY_DSN_JAVA: https://dummy@sentry.io/0
          FIREBASE_SERVICE_ACCOUNT_JSON: "{}"
          APP_URL: http://localhost:8080
          LANDING_URL: http://localhost:3000

      - name: Upload surefire reports
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: backend/target/surefire-reports/

  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: test
    environment: staging

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      # NOTE : `railway up` (et non `railway deploy`, réservé aux templates).
      # Le token projet Railway (Project Settings > Tokens) est scopé
      # projet + environnement : pas besoin de `railway link` ni de PROJECT_ID.
      # Prérequis côté Railway : service nommé `gwangmeu-backend-staging`
      # avec Root Directory = backend (voir docs/DEPLOIEMENT.md).
      - name: Deploy to Railway Staging
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN_STAGING }}
        run: |
          if [ -z "$RAILWAY_TOKEN" ]; then
            echo "::notice::RAILWAY_TOKEN_STAGING non configuré — déploiement staging ignoré (voir docs/DEPLOIEMENT.md)."
            exit 0
          fi
          railway up --service gwangmeu-backend-staging --ci

      # APP_HEALTH_URL_STAGING = URL complète du health check,
      # ex. https://gwangmeu-backend-staging.up.railway.app/actuator/health
      - name: Health check Staging
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN_STAGING }}
          HEALTH_URL: ${{ secrets.APP_HEALTH_URL_STAGING }}
        run: |
          if [ -z "$RAILWAY_TOKEN" ]; then
            exit 0
          fi
          if [ -z "$HEALTH_URL" ]; then
            echo "::warning::APP_HEALTH_URL_STAGING non configuré — health check ignoré."
            exit 0
          fi
          echo "Health check : $HEALTH_URL"
          for i in $(seq 1 30); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$HEALTH_URL" || true)
            if [ "$STATUS" = "200" ]; then
              echo "Staging OK (tentative $i)"
              exit 0
            fi
            echo "Tentative $i/30 — HTTP $STATUS, nouvel essai dans 10 s..."
            sleep 10
          done
          echo "Health check échoué après 5 minutes"
          exit 1
