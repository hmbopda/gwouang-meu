name: Deploy — Production

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  test:
    name: Test Backend
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgis/postgis:16-3.4-alpine
        ports:
          - 5432:5432
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: gwangmeu_test
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: temurin

      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Run tests
        working-directory: backend
        run: mvn verify -B -q
        env:
          SUPABASE_DB_URL: jdbc:postgresql://localhost:5432/gwangmeu_test
          SUPABASE_URL: https://dummy.supabase.co
          SUPABASE_ANON_KEY: dummy-anon-key
          SUPABASE_SERVICE_KEY: dummy-service-key
          REDIS_URL: redis://localhost:6379
          REDIS_TOKEN: dummy-redis-token
          NEO4J_URI: bolt://localhost:7687
          NEO4J_USERNAME: neo4j
          NEO4J_PASSWORD: dummy-neo4j-password
          JWT_SECRET: test_secret_ci_32_chars_minimum_here
          ANTHROPIC_API_KEY: sk-ant-test-dummy
          LIVEKIT_API_KEY: dummy-livekit-key
          LIVEKIT_API_SECRET: dummy-livekit-secret
          LIVEKIT_WS_URL: wss://dummy.livekit.cloud
          MAPBOX_ACCESS_TOKEN: pk.dummy-mapbox-token
          MEILISEARCH_HOST: http://localhost:7700
          MEILISEARCH_API_KEY: dummy-meilisearch-key
          R2_ACCESS_KEY_ID: dummy-r2-access-key
          R2_SECRET_ACCESS_KEY: dummy-r2-secret-key
          R2_BUCKET_NAME: gwangmeu-media
          R2_ACCOUNT_ID: dummy-cloudflare-account-id
          RESEND_API_KEY: re_dummy_key
          SENTRY_DSN_JAVA: https://dummy@sentry.io/0
          FIREBASE_SERVICE_ACCOUNT_JSON: "{}"
          APP_URL: http://localhost:8080
          LANDING_URL: http://localhost:3000

      - name: Upload surefire reports
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: backend/target/surefire-reports/

  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: test

    outputs:
      version: ${{ steps.extract-version.outputs.version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version from tag
        id: extract-version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Build and push Docker image
        run: |
          VERSION=${{ steps.extract-version.outputs.version }}
          ORG=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          IMAGE="ghcr.io/${ORG}/gwangmeu-backend"
          docker build -f backend/Dockerfile backend/ \
            -t "${IMAGE}:${VERSION}" \
            -t "${IMAGE}:latest"
          docker push "${IMAGE}:${VERSION}"
          docker push "${IMAGE}:latest"

  deploy-prod:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy to Railway Production
        run: railway deploy --service gwangmeu-backend-prod --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          RAILWAY_PROJECT_ID: ${{ secrets.RAILWAY_PROJECT_ID_PROD }}

      - name: Health check Production
        run: |
          echo "Waiting for deployment to be ready..."
          sleep 60
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://api.gwangmeu.com/actuator/health)
          if [ "$STATUS" = "200" ]; then
            echo "Production OK"
          else
            echo "Health check failed — HTTP $STATUS. Rolling back..."
            railway rollback --service gwangmeu-backend-prod
            exit 1
          fi
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          RAILWAY_PROJECT_ID: ${{ secrets.RAILWAY_PROJECT_ID_PROD }}

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: deploy-prod

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          token: ${{ secrets.GHCR_TOKEN }}
