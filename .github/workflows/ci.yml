name: CI — Tests

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [develop]

jobs:
  # ── Backend Spring Boot ────────────────────────────────────────────────────
  test-backend:
    name: Test Backend
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgis/postgis:16-3.4-alpine
        ports:
          - 5432:5432
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: gwangmeu_test
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: temurin

      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Run tests
        working-directory: backend
        run: mvn verify -B -q
        env:
          SUPABASE_DB_URL: jdbc:postgresql://localhost:5432/gwangmeu_test
          SUPABASE_URL: https://dummy.supabase.co
          SUPABASE_ANON_KEY: dummy-anon-key
          SUPABASE_SERVICE_KEY: dummy-service-key
          REDIS_URL: redis://localhost:6379
          REDIS_TOKEN: dummy-redis-token
          NEO4J_URI: bolt://localhost:7687
          NEO4J_USERNAME: neo4j
          NEO4J_PASSWORD: dummy-neo4j-password
          JWT_SECRET: test_secret_ci_32_chars_minimum_here
          ANTHROPIC_API_KEY: sk-ant-test-dummy
          LIVEKIT_API_KEY: dummy-livekit-key
          LIVEKIT_API_SECRET: dummy-livekit-secret
          LIVEKIT_WS_URL: wss://dummy.livekit.cloud
          MAPBOX_ACCESS_TOKEN: pk.dummy-mapbox-token
          MEILISEARCH_HOST: http://localhost:7700
          MEILISEARCH_API_KEY: dummy-meilisearch-key
          R2_ACCESS_KEY_ID: dummy-r2-access-key
          R2_SECRET_ACCESS_KEY: dummy-r2-secret-key
          R2_BUCKET_NAME: gwangmeu-media
          R2_ACCOUNT_ID: dummy-cloudflare-account-id
          RESEND_API_KEY: re_dummy_key
          SENTRY_DSN_JAVA: https://dummy@sentry.io/0
          FIREBASE_SERVICE_ACCOUNT_JSON: "{}"
          APP_URL: http://localhost:8080
          LANDING_URL: http://localhost:3000

      - name: Upload surefire reports
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: backend/target/surefire-reports/

  build-docker:
    name: Build Docker Image (validation)
    runs-on: ubuntu-latest
    needs: test-backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -f backend/Dockerfile backend/ --no-cache

  # ── Flutter frontend ───────────────────────────────────────────────────────
  test-flutter:
    name: Test Flutter
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.x'
          channel: stable
          cache: true

      - name: Create .env for CI
        working-directory: frontend
        run: |
          echo "SUPABASE_URL=https://dummy.supabase.co" > .env
          echo "SUPABASE_ANON_KEY=dummy-anon-key" >> .env
          echo "API_BASE_URL=http://localhost:8080" >> .env

      - name: Install dependencies
        working-directory: frontend
        run: flutter pub get

      - name: Generate code (Freezed + Riverpod)
        working-directory: frontend
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Analyze
        working-directory: frontend
        run: flutter analyze --no-fatal-infos

      - name: Run tests
        working-directory: frontend
        run: flutter test

      - name: Build web (validation)
        working-directory: frontend
        run: flutter build web --release --no-tree-shake-icons

  # ── Next.js landing ────────────────────────────────────────────────────────
  build-landing:
    name: Build Next.js Landing
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: landing/package-lock.json

      - name: Create .env.local for CI
        working-directory: landing
        run: |
          echo "NEXT_PUBLIC_API_URL=http://localhost:8080" > .env.local
          echo "NEXT_PUBLIC_APP_URL=https://app.gwangmeu.com" >> .env.local
          echo "NEXT_PUBLIC_SITE_URL=https://gwangmeu.com" >> .env.local

      - name: Install dependencies
        working-directory: landing
        run: npm ci

      - name: Type check
        working-directory: landing
        run: npm run type-check

      - name: Build
        working-directory: landing
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8080
          NEXT_PUBLIC_APP_URL: https://app.gwangmeu.com
          NEXT_PUBLIC_SITE_URL: https://gwangmeu.com
