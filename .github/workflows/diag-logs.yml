name: Diag Cloud Run logs

on:
  workflow_dispatch:

jobs:
  logs:
    runs-on: ubuntu-latest
    steps:
      - name: Auth GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2
      - name: Read backend error logs
        run: |
          echo "===== ERREURS RÉCENTES (severity>=ERROR, 40 min) ====="
          gcloud logging read \
            'resource.type="cloud_run_revision" AND resource.labels.service_name="gwangmeu-backend" AND severity>=ERROR' \
            --limit 40 --freshness=40m --order=desc \
            --format="value(textPayload)" --project gwangmeu || true
          echo "===== DERNIERS LOGS (tous niveaux, 20 min) ====="
          gcloud logging read \
            'resource.type="cloud_run_revision" AND resource.labels.service_name="gwangmeu-backend"' \
            --limit 60 --freshness=20m --order=desc \
            --format="value(textPayload)" --project gwangmeu || true
