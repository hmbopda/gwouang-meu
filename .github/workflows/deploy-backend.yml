name: Deploy Backend — Cloud Run

# Déploiement automatique du backend sur Google Cloud Run à chaque push
# touchant backend/**. Le build (Dockerfile) se fait via Cloud Build (`--source`).
#
# IMPORTANT : on ne passe PAS les variables d'environnement ici. `gcloud run
# deploy` sur un service existant CONSERVE les variables déjà configurées sur le
# service (celles posées au premier déploiement via --env-vars-file). La CI n'a
# donc jamais besoin des secrets applicatifs — seulement d'un accès de déploiement.
#
# Prérequis (une seule fois) : secret GitHub `GCP_SA_KEY` = clé JSON d'un compte
# de service GCP autorisé (voir docs/DEPLOIEMENT.md / message de mise en place).

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/deploy-backend.yml'
  workflow_dispatch:

jobs:
  deploy:
    name: Build & Deploy to Cloud Run
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Deploy to Cloud Run (conserve les variables existantes)
        run: |
          gcloud run deploy gwangmeu-backend \
            --source backend \
            --project "${{ steps.auth.outputs.project_id }}" \
            --region europe-west1 \
            --port 8080 \
            --memory 1Gi --cpu 1 \
            --min-instances 0 --max-instances 2 \
            --timeout 300 \
            --allow-unauthenticated \
            --quiet

      - name: Health check
        run: |
          URL=$(gcloud run services describe gwangmeu-backend \
            --region europe-west1 \
            --project "${{ steps.auth.outputs.project_id }}" \
            --format='value(status.url)')
          echo "Service URL : $URL"
          for i in $(seq 1 24); do
            CODE=$(curl -s -o /dev/null -w "%{http_code}" "$URL/actuator/health" || true)
            if [ "$CODE" = "200" ]; then echo "✅ Backend UP (tentative $i)"; exit 0; fi
            echo "Tentative $i/24 — HTTP $CODE, nouvel essai dans 10 s…"
            sleep 10
          done
          echo "::error::Health check échoué après 4 min"
          exit 1
