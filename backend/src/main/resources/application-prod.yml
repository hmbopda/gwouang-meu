spring:
  jpa:
    show-sql: false
    properties:
      hibernate:
        # Desactive les prepared statements cote Hibernate (incompatible PgBouncer)
        jdbc:
          use_get_generated_keys: false
        query:
          in_clause_parameter_padding: true

  flyway:
    out-of-order: false

  # ===== Neo4j : timeout reduit pour eviter blocage au demarrage =====
  neo4j:
    connection-timeout: 10s
    max-transaction-retry-time: 15s

  # ===== Mail (Gmail SMTP en prod) =====
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  # ===== Datasource : Transaction Pooler Supabase port 6543 (PgBouncer) =====
  # Port 5432 est bloque par Railway — port 6543 = Transaction Pooler Supabase
  datasource:
    url: jdbc:postgresql://db.objlxdxzpqhrekpqxgab.supabase.co:6543/postgres?sslmode=require&pgbouncer=true
    hikari:
      maximum-pool-size: 5
      minimum-idle: 1
      connection-timeout: 20000
      initialization-fail-timeout: 60000
      # PgBouncer : desactive prepared statements
      data-source-properties:
        prepareThreshold: 0

# ===== Actuator : health toujours accessible sans auth pour Railway =====
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never
      probes:
        enabled: true
  health:
    neo4j:
      enabled: true
    redis:
      enabled: true
    db:
      enabled: true

springdoc:
  swagger-ui:
    enabled: false
  api-docs:
    enabled: false

logging:
  level:
    com.gwangmeu: WARN
    org.springframework.security: WARN
    org.springframework.data.neo4j: WARN
    io.lettuce: WARN
