spring:
  jpa:
    # Flyway est la SOURCE DE VERITE du schema en prod. On desactive la
    # validation Hibernate au demarrage (fragile : ex. CHAR vs VARCHAR faisait
    # crasher le boot). Les migrations garantissent la coherence.
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        # Desactive les prepared statements cote Hibernate (incompatible PgBouncer)
        jdbc:
          use_get_generated_keys: false
        query:
          in_clause_parameter_padding: true

  flyway:
    out-of-order: false

  # ===== Neo4j : timeout reduit pour eviter blocage au demarrage =====
  neo4j:
    connection-timeout: 10s
    max-transaction-retry-time: 15s

  # ===== Mail (Resend en prod — SMTP transactionnel, domaine verifie) =====
  # Moteur unique : Resend (SMTPS 465). MAIL_PASSWORD = cle API Resend.
  # MAIL_FROM doit etre une adresse du domaine verifie dans Resend
  # (ex. noreply@gwouangmeu.com). Surchargeable par variables d'env.
  # Pour basculer sur l'API HTTP Resend (plus robuste sur Cloud Run), definir
  # application.mail.provider=resend-api + application.mail.resend-api-key.
  mail:
    host: ${MAIL_HOST:smtp.resend.com}
    port: ${MAIL_PORT:465}
    username: ${MAIL_USERNAME:resend}
    password: ${MAIL_PASSWORD:}
    protocol: smtps
    properties:
      mail:
        smtp:
          auth: true
          ssl:
            enable: true

  # ===== Datasource : Supavisor Pooler (IPv4, compatible Railway) =====
  # Railway ne supporte pas IPv6 — db.supabase.co resout en IPv6 uniquement
  # Supavisor pooler = IPv4, port 6543, username = postgres.PROJECT_ID
  datasource:
    url: jdbc:postgresql://aws-1-eu-west-2.pooler.supabase.com:5432/postgres?sslmode=require
    username: postgres.objlxdxzpqhrekpqxgab
    hikari:
      maximum-pool-size: 5
      minimum-idle: 1
      connection-timeout: 20000
      initialization-fail-timeout: 60000
      # Transaction mode Supavisor : desactive prepared statements
      data-source-properties:
        prepareThreshold: 0

# ===== Actuator : health toujours accessible sans auth pour Railway =====
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never
      probes:
        enabled: true
  health:
    # Neo4j sert uniquement à la synchro asynchrone du graphe généalogique
    # (non bloquant au démarrage). Si l'instance AuraDB est en pause, son
    # health « DOWN » ferait échouer le healthcheck Railway et bloquerait le
    # déploiement — on le retire donc de l'agrégat de santé.
    neo4j:
      enabled: false
    redis:
      enabled: true
    db:
      enabled: true
    mail:
      enabled: false

springdoc:
  swagger-ui:
    enabled: true
  api-docs:
    enabled: true

logging:
  level:
    com.gwangmeu: WARN
    org.springframework.security: WARN
    org.springframework.data.neo4j: WARN
    io.lettuce: WARN
