spring:
  application:
    name: gwangmeu-backend

  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  # ===== PostgreSQL (Supabase) =====
  datasource:
    url: ${SUPABASE_DB_URL}
    username: ${SUPABASE_DB_USER}
    password: ${SUPABASE_DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 600000

  # ===== JPA (schema geree par Flyway) =====
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        jdbc:
          time_zone: UTC

  # ===== Flyway =====
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  # ===== OAuth2 Resource Server (Supabase JWT) =====
  # On utilise UNIQUEMENT jwk-set-uri pour eviter l'appel reseau auto-discovery
  # au demarrage (issuer-uri declenchait un GET vers Supabase avant que l'app soit prete)
  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: ${SUPABASE_JWKS_URI}

  # ===== MAIL (SMTP) =====
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enabled: true

  # ===== Neo4j (Genealogie) =====
  neo4j:
    uri: ${NEO4J_URI}
    authentication:
      username: ${NEO4J_USERNAME}
      password: ${NEO4J_PASSWORD}

  # ===== Redis (Upstash) =====
  data:
    redis:
      url: ${REDIS_URL}

  # ===== Multipart (upload fichiers) =====
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 6MB

  # ===== Jackson (serialisation JSON) =====
  jackson:
    serialization:
      write-dates-as-timestamps: false
    deserialization:
      fail-on-unknown-properties: false

server:
  port: ${PORT:8080}
  servlet:
    context-path: /
    # Force UTF-8 sur les corps de requête/réponse (noms accentués : é, ç, ô…)
    encoding:
      charset: UTF-8
      enabled: true
      force: true

# ===== Application custom =====
application:
  anthropic-api-key: ${ANTHROPIC_API_KEY:}
  r2:
    access-key-id: ${R2_ACCESS_KEY_ID:}
    secret-access-key: ${R2_SECRET_ACCESS_KEY:}
    bucket-name: ${R2_BUCKET_NAME:gwangmeu-media}
    account-id: ${R2_ACCOUNT_ID:}
    public-url: ${R2_PUBLIC_URL:https://media.gwangmeu.com}
  base-url: ${APP_BASE_URL:https://gwangmeu.com}
  mail-from: ${MAIL_FROM:noreply@gwangmeu.com}
  # Moteur email : 'smtp' (via spring.mail, defaut) ou 'resend-api' (API HTTP Resend).
  mail:
    provider: ${MAIL_PROVIDER:smtp}
    resend-api-key: ${RESEND_API_KEY:}
  firebase:
    service-account-json: ${FIREBASE_SERVICE_ACCOUNT_JSON:}
  livekit:
    api-key: ${LIVEKIT_API_KEY:}
    api-secret: ${LIVEKIT_API_SECRET:}
    ws-url: ${LIVEKIT_WS_URL:}

# ===== Actuator =====
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized

# ===== Springdoc OpenAPI =====
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    try-it-out-enabled: true
    operations-sorter: alpha

# ===== Sentry =====
sentry:
  dsn: ${SENTRY_DSN:}
  traces-sample-rate: 0.2
  environment: ${SPRING_PROFILES_ACTIVE:dev}

# ===== Logging =====
logging:
  level:
    com.gwangmeu: INFO
    org.springframework.security: WARN
    org.flywaydb: INFO
