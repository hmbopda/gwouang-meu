<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, viewport-fit=cover">
  <meta name="description" content="GWANG MEU — Mémoire des villages. Préservez les langues, la généalogie et la culture de votre village, avec la diaspora.">

  <!-- PWA : couleur de thème (or Tissage) -->
  <meta name="theme-color" content="#C9A84C">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="GWANG MEU">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>GWANG MEU — Mémoire des villages</title>
  <link rel="manifest" href="manifest.json">

  <!-- Anti-cache PWA : le service worker Flutter servait des versions périmées
       (« je vois rien » après déploiement). On désenregistre tout SW existant et
       on purge ses caches → l'app est toujours à jour. Le build utilise aussi
       --pwa-strategy=none (plus aucun SW enregistré). -->
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.getRegistrations()
        .then(function (regs) { regs.forEach(function (r) { r.unregister(); }); })
        .catch(function () {});
    }
    if (window.caches && caches.keys) {
      caches.keys()
        .then(function (keys) { keys.forEach(function (k) { caches.delete(k); }); })
        .catch(function () {});
    }
  </script>
</head>
<body>
  <!-- Splash de chargement pendant l'init Flutter (thème crème par défaut) -->
  <div id="loading" style="
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    background: #FAF6EE;
    flex-direction: column;
    font-family: sans-serif;
  ">
    <!-- Bande tissée signature -->
    <div style="
      position: fixed; top: 0; left: 0; right: 0; height: 4px;
      background: repeating-linear-gradient(90deg, #C9A84C 0 28px, #2A7A5C 28px 40px, #C9A84C 40px 68px, #C4583A 68px 80px);
    "></div>
    <div style="
      width: 56px; height: 56px; border-radius: 16px;
      background: #C9A84C; color: #0C0B0F;
      display: flex; align-items: center; justify-content: center;
      font-weight: 700; font-size: 28px; margin-bottom: 20px;
      font-family: Georgia, 'Times New Roman', serif;
    ">G</div>
    <div style="
      width: 40px; height: 40px;
      border: 3px solid rgba(201,168,76,0.25);
      border-top-color: #C9A84C;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    "></div>
    <p style="color: #6B6255; margin-top: 16px; font-size: 13px; letter-spacing: 0.5px;">Chargement…</p>
  </div>
  <style>@keyframes spin { to { transform: rotate(360deg); } }</style>
  <script src="flutter_bootstrap.js" async></script>
  <script>
    window.addEventListener('flutter-first-frame', function() {
      var el = document.getElementById('loading');
      if (el) el.remove();
    });
  </script>
</body>
</html>
