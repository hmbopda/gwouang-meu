name: gwangmeu
description: "GWANG MEU - Patrimoine Culturel Africain | Langues · Culture · Futur"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'
  flutter: '>=3.22.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # Auth & Backend
  supabase_flutter: ^2.5.0

  # Navigation
  go_router: ^14.0.0

  # State management
  flutter_riverpod: ^2.5.0
  riverpod_annotation: ^2.3.0

  # HTTP
  dio: ^5.4.0

  # Storage
  flutter_secure_storage: ^9.0.0
  shared_preferences: ^2.3.0

  # Images
  cached_network_image: ^3.3.0
  image_picker: ^1.1.0

  # Partage natif (Web Share API / intent mobile)
  share_plus: ^10.1.4

  # Loading UI
  shimmer: ^3.0.0

  # Models
  freezed_annotation: ^2.4.0
  json_annotation: ^4.9.0

  # i18n + dates
  intl: ^0.20.2
  timeago: ^3.6.1

  # .env
  flutter_dotenv: ^5.2.0

  # Icons
  cupertino_icons: ^1.0.8
  material_symbols_icons: ^4.2785.1

  # Synthèse vocale (prononciation du traducteur — web + mobile)
  flutter_tts: ^4.2.0

  # Ouvrir navigateur pour OAuth (Google, Facebook, etc.)
  url_launcher: ^6.3.0

  # Offline cache
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  connectivity_plus: ^6.0.3

  # Firebase + notifications
  firebase_core: ^3.6.0
  firebase_messaging: ^15.1.3
  flutter_local_notifications: ^17.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  mocktail: ^1.0.4
  flutter_lints: ^4.0.0
  build_runner: ^2.4.0
  freezed: ^2.5.0
  json_serializable: ^6.8.0
  riverpod_generator: ^2.4.0
  custom_lint: ^0.6.0
  riverpod_lint: ^2.3.0
  hive_generator: ^2.0.1

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/images/

  # Typographies Tissage bundlées (subset latin, variantes statiques).
  fonts:
    - family: Fraunces
      fonts:
        - asset: assets/fonts/Fraunces-Regular.ttf
          weight: 400
        - asset: assets/fonts/Fraunces-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Fraunces-Bold.ttf
          weight: 700
        - asset: assets/fonts/Fraunces-MediumItalic.ttf
          weight: 500
          style: italic
        - asset: assets/fonts/Fraunces-SemiBoldItalic.ttf
          weight: 600
          style: italic
    - family: Syne
      fonts:
        - asset: assets/fonts/Syne-Regular.ttf
          weight: 400
        - asset: assets/fonts/Syne-Medium.ttf
          weight: 500
        - asset: assets/fonts/Syne-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Syne-Bold.ttf
          weight: 700
    - family: JetBrainsMono
      fonts:
        - asset: assets/fonts/JetBrainsMono-Regular.ttf
          weight: 400
        - asset: assets/fonts/JetBrainsMono-SemiBold.ttf
          weight: 600
